name: Build Mineradio APK

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Install Node.js backend dependencies
        run: |
          cd app/src/main/assets/nodejs-project
          npm install --production

      - name: Build Release APK
        run: |
          chmod +x gradlew
          keytool -genkey -v -keystore release.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android,OU=Dev,O=Mineradio,L=Unknown,C=US"
          ./gradlew assembleRelease
          ls app/build/outputs/apk/release/
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks release.keystore --ks-pass pass:android --ks-key-alias android app/build/outputs/apk/release/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Android-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
